interface:
  display_name: "Problem Framing"
  short_description: "Scope a vague idea into a runnable plan and handoff."
  default_prompt: "Use $problem-framing to turn this rough research idea into `research/research_plan.md` with scope, non-goals, success criteria, a minimal validation path, and a next-agent handoff."

policy:
  allow_implicit_invocation: true
