# Repo-local defaults for research work in this repository.
# Keep the base model at GPT-5.4 and reserve stronger reasoning for the
# planning and review agents that actually need it.
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"

# Long enough for literature sweeps, synthesis, and moderate experiment loops.
job_max_runtime_seconds = 14400

# If your Codex surface supports plan-specific overrides, prefer xhigh there.
# Example:
# [plan_mode]
# model_reasoning_effort = "xhigh"

[features]
multi_agent = true

[agents]
# Research work often benefits from independent scouts and reviewers.
max_threads = 8

# Keep fan-out shallow; the main agent should coordinate, not recurse.
max_depth = 1
