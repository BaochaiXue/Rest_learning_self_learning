# Repo-local defaults for research work in this repository.
# Treat AGENTS.md as the map: use explicit decomposition, not recursive fan-out.
model = "gpt-5.4"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"

# Long enough for literature sweeps, synthesis, and long-running research loops.
job_max_runtime_seconds = 14400

# Planning and reviewer agents should override reasoning upward when they are
# building contracts, decompositions, or skeptical evaluations.
# Example:
# [plan_mode]
# model_reasoning_effort = "xhigh"

[features]
multi_agent = true

[agents]
# Research work benefits from independent scouts and reviewers.
max_threads = 8

# Keep fan-out shallow; the main agent coordinates handoffs, not recursion.
max_depth = 1
